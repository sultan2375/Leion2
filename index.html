<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EarnFlow</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{
background:#000;
font-family:Arial;
}
.glow{
box-shadow:0 0 20px #22c55e;
}
</style>
</head>
<body class="text-white min-h-screen p-5">

<div class="max-w-md mx-auto">

<h1 class="text-4xl font-bold text-center text-green-400 mb-6">EarnFlow</h1>

<div id="authBox" class="bg-zinc-900 p-6 rounded-3xl glow mb-5">

<h2 class="text-2xl font-bold mb-4 text-center">Create Account</h2>

<input id="email" type="email" placeholder="Email"
class="w-full p-3 rounded-xl bg-zinc-800 mb-3 outline-none">

<input id="password" type="password" placeholder="Password"
class="w-full p-3 rounded-xl bg-zinc-800 mb-3 outline-none">

<button onclick="register()"
class="w-full bg-green-500 p-3 rounded-xl font-bold mb-3">
Register
</button>

<button onclick="login()"
class="w-full bg-blue-500 p-3 rounded-xl font-bold">
Login
</button>

</div>

<div id="dashboard" class="hidden">

<div class="bg-zinc-900 p-6 rounded-3xl glow mb-5 text-center">
<h2 class="text-2xl font-bold">Current Balance</h2>
<h1 id="balance" class="text-5xl font-bold text-green-400 mt-3">$0.00</h1>
</div>

<div class="grid grid-cols-2 gap-4 mb-5">

<button onclick="watchAd()"
class="bg-green-500 p-5 rounded-2xl text-lg font-bold">
Watch Ad
</button>

<button onclick="dailyBonus()"
class="bg-blue-500 p-5 rounded-2xl text-lg font-bold">
Daily Bonus
</button>

<button onclick="referral()"
class="bg-yellow-500 p-5 rounded-2xl text-lg font-bold text-black">
Referral
</button>

<button onclick="withdraw()"
class="bg-red-500 p-5 rounded-2xl text-lg font-bold">
Withdraw
</button>

</div>

<div class="bg-zinc-900 p-5 rounded-3xl">
<h2 class="text-xl font-bold mb-4">Withdraw Request</h2>

<input id="wallet" type="text" placeholder="Binance UID"
class="w-full p-3 rounded-xl bg-zinc-800 mb-3 outline-none">

<input id="amount" type="number" placeholder="Amount"
class="w-full p-3 rounded-xl bg-zinc-800 mb-3 outline-none">

<button onclick="submitWithdraw()"
class="w-full bg-green-500 p-3 rounded-xl font-bold">
Submit Withdraw
</button>
</div>

<button onclick="logout()"
class="w-full mt-5 bg-zinc-700 p-3 rounded-2xl font-bold">
Logout
</button>

</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyD0vlcKhoA9ZBboB2Sl3L3C7UsMso9xAZQ",
  authDomain: "earnflow-4fec7.firebaseapp.com",
  databaseURL: "https://earnflow-4fec7-default-rtdb.firebaseio.com",
  projectId: "earnflow-4fec7",
  storageBucket: "earnflow-4fec7.firebasestorage.app",
  messagingSenderId: "583765163036",
  appId: "1:583765163036:web:2398fa945f8cc135c5b3d9",
  measurementId: "G-B4ZXHV686G"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentBalance = 0;

function register(){
const email = document.getElementById('email').value;
const password = document.getElementById('password').value;

auth.createUserWithEmailAndPassword(email,password)
.then((userCredential)=>{
const uid = userCredential.user.uid;

return db.collection('users').doc(uid).set({
email:email,
balance:0
});
})
.then(()=>{
alert('Registration Successful');
})
.catch((error)=>{
alert(error.message);
});
}

function login(){
const email = document.getElementById('email').value;
const password = document.getElementById('password').value;

auth.signInWithEmailAndPassword(email,password)
.then(()=>{
alert('Login Successful');
})
.catch((error)=>{
alert(error.message);
});
}

function logout(){
auth.signOut();
}

auth.onAuthStateChanged((user)=>{
if(user){
document.getElementById('authBox').classList.add('hidden');
document.getElementById('dashboard').classList.remove('hidden');

loadBalance(user.uid);
}else{
document.getElementById('authBox').classList.remove('hidden');
document.getElementById('dashboard').classList.add('hidden');
}
});

function loadBalance(uid){
db.collection('users').doc(uid).onSnapshot((doc)=>{
if(doc.exists){
currentBalance = doc.data().balance || 0;
document.getElementById('balance').innerText = '$' + currentBalance.toFixed(2);
}
});
}

function updateBalance(amount){
const user = auth.currentUser;
if(!user) return;

currentBalance += amount;

return db.collection('users').doc(user.uid).update({
balance: currentBalance
});
}

function watchAd(){
alert('Monetag Ad Opened');
updateBalance(0.05);
}

function dailyBonus(){
alert('Daily Bonus Added');
updateBalance(0.10);
}

function referral(){
const user = auth.currentUser;

const link = window.location.href + '?ref=' + user.uid;

navigator.clipboard.writeText(link);

alert('Referral Link Copied');
}

function withdraw(){
window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
}

function submitWithdraw(){
const wallet = document.getElementById('wallet').value;
const amount = document.getElementById('amount').value;

if(wallet === '' || amount === ''){
alert('Fill all fields');
return;
}

alert('Withdraw Request Submitted');
}

</script>

<script src='//libtl.com/sdk.js' data-zone='10999771' data-sdk='show_10999771'></script>

</body>
</html>
